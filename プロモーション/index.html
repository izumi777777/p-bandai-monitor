<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beta App Promo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@900&display=swap');

        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 背景のグリッドアニメーション */
        .grid-bg {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 50, 0, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 50, 0, 0.2) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg);
            animation: moveGrid 5s linear infinite;
            z-index: -1;
            opacity: 0.3;
        }

        @keyframes moveGrid {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(40px); }
        }

        .scene {
            display: none;
            text-align: center;
            width: 100%;
            max-width: 600px;
        }

        .active {
            display: block;
        }

        /* タイピングエフェクト */
        .typing {
            border-right: 2px solid #00ff41;
            white-space: nowrap;
            overflow: hidden;
            animation: blink 0.75s step-end infinite;
            font-size: 1.5rem;
            margin: 0 auto;
            display: inline-block;
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        /* スキャンエフェクト */
        .scan-line {
            width: 100%;
            height: 2px;
            background: #00ff41;
            box-shadow: 0 0 10px #00ff41;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(-100px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(100px); opacity: 0; }
        }

        /* 利益確定のパルス */
        .pulse-text {
            animation: pulse-green 1s infinite;
        }

        @keyframes pulse-green {
            0% { text-shadow: 0 0 5px #00ff41; }
            50% { text-shadow: 0 0 20px #00ff41, 0 0 40px #00ff41; transform: scale(1.05); }
            100% { text-shadow: 0 0 5px #00ff41; }
        }

        .card {
            background: rgba(0, 20, 0, 0.8);
            border: 1px solid #00ff41;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .log-text {
            font-size: 0.8rem;
            color: #ccc;
            text-align: left;
            height: 100px;
            overflow: hidden;
            opacity: 0.7;
        }
        
        /* プログレスバー */
        .progress-container {
            width: 100%;
            background-color: #333;
            border-radius: 4px;
            margin: 20px 0;
            height: 6px;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: #00ff41;
            border-radius: 4px;
            transition: width 0.1s;
        }

        /* --- パチスロ風演出用CSS --- */
        .flash-bg {
            animation: bg-flash 0.2s infinite;
            background: radial-gradient(circle, #ff0000, #330000);
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes bg-flash {
            0% { filter: brightness(1); }
            50% { filter: brightness(2); }
            100% { filter: brightness(1); }
        }

        .gekiatsu-container {
            position: relative;
            z-index: 50;
            animation: shake 0.5s infinite;
        }

        .rainbow-text {
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 8rem;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(to right, 
                #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8f00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            animation: rainbow-move 0.5s linear infinite, pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .sub-flash-text {
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 3rem;
            color: #fff;
            text-shadow: 4px 4px 0px #ff0000;
            margin-bottom: 1rem;
            animation: blink-fast 0.1s infinite;
        }

        @keyframes rainbow-move {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        @keyframes blink-fast {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes pop-in {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <!-- SCENE 1: Intro -->
    <div id="scene1" class="scene active">
        <h1 class="text-4xl font-bold mb-4 glitch" style="font-family: 'Noto Sans JP', sans-serif;">市場の歪みを検知せよ</h1>
        <div class="text-xl mt-4 text-gray-400">Daily Goods Arbitrage Monitor <span class="text-xs border border-green-500 px-1 rounded">BETA</span></div>
        <button onclick="startAnimation()" class="mt-8 px-6 py-2 border border-green-500 hover:bg-green-900 transition text-sm tracking-widest">
            SYSTEM START
        </button>
    </div>

    <!-- SCENE 2: Scanning -->
    <div id="scene2" class="scene">
        <div class="flex justify-center items-center space-x-8 mb-8">
            <div class="text-center">
                <i class="fas fa-globe text-4xl mb-2"></i>
                <div class="text-xs">KAO WEBSITE</div>
            </div>
            <div class="text-2xl"><i class="fas fa-exchange-alt"></i></div>
            <div class="text-center">
                <i class="fas fa-gavel text-4xl mb-2"></i>
                <div class="text-xs">YAHOO AUCTION</div>
            </div>
        </div>
        <div class="scan-line mb-4"></div>
        <div class="log-text" id="log-display"></div>
        <div class="progress-container">
            <div class="progress-bar" id="scan-progress"></div>
        </div>
        <div class="text-sm blink">SCANNING DISCONTINUED ITEMS...</div>
    </div>

    <!-- SCENE 3: AI Analysis -->
    <div id="scene3" class="scene">
        <div class="relative w-32 h-32 mx-auto mb-6">
            <div class="absolute inset-0 border-4 border-green-500 rounded-full border-t-transparent animate-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center">
                <i class="fas fa-brain text-4xl text-white"></i>
            </div>
        </div>
        <h2 class="text-2xl font-bold mb-2">Azure AI Analyzing</h2>
        <div id="ai-status" class="text-sm text-gray-300 h-8">Checking Retail Price...</div>
        
        <div class="flex justify-center mt-6 space-x-4">
            <div class="bg-gray-900 p-2 rounded border border-gray-700 w-1/3">
                <div class="text-xs text-gray-500">Retail</div>
                <div class="text-lg font-bold">¥547</div>
            </div>
            <div class="bg-gray-900 p-2 rounded border border-gray-700 w-1/3">
                <div class="text-xs text-gray-500">Auction</div>
                <div class="text-lg font-bold">¥2,345</div>
            </div>
        </div>
    </div>

    <!-- SCENE 3.5: Gekiatsu (Pachislot Style Flash) -->
    <div id="scene-flash" class="scene">
        <div class="flash-bg">
            <div class="gekiatsu-container">
                <div class="sub-flash-text"><i class="fas fa-exclamation-triangle"></i> 激 熱 <i class="fas fa-exclamation-triangle"></i></div>
                <div class="rainbow-text">確 定 !</div>
            </div>
        </div>
    </div>

    <!-- SCENE 4: Result -->
    <div id="scene4" class="scene">
        <div class="text-5xl mb-4 text-yellow-400"><i class="fas fa-check-circle"></i></div>
        <h1 class="text-4xl font-bold mb-2 pulse-text" style="font-family: 'Noto Sans JP', sans-serif;">利益商品 確定</h1>
        
        <div id="result-card" class="card">
            <div class="flex items-start">
                <div class="w-16 h-16 bg-gray-800 flex items-center justify-center mr-4 rounded">
                    <i class="fas fa-box-open text-2xl"></i>
                </div>
                <div class="text-left flex-1">
                    <div class="text-xs text-gray-400">ITEM MATCHED</div>
                    <div class="font-bold text-sm mb-1">クイックルワイパー 立体吸着ウエット...</div>
                    <div class="flex justify-between items-end border-t border-gray-700 pt-2 mt-2">
                        <div class="text-xs">Est. Profit</div>
                        <div class="text-2xl font-bold text-yellow-400">¥1,563</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-8 text-sm text-gray-500">Auto-Added to Purchase List</div>
    </div>

    <script>
        const logs = [
            "Connecting to KAO_URL...",
            "Fetching discontinued list...",
            "Found: Quickle Wiper (Strong)",
            "Found: Biore Hand Soap",
            "Checking Yahoo Auction API...",
            "Search: 'Quickle Wiper' -> 12 hits",
            "Search: 'Biore' -> 5 hits",
            "Data aggregation complete."
        ];

        function switchScene(id) {
            document.querySelectorAll('.scene').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function typeLog(index = 0) {
            const logDiv = document.getElementById('log-display');
            if (index < logs.length) {
                logDiv.innerHTML += `> ${logs[index]}<br>`;
                logDiv.scrollTop = logDiv.scrollHeight;
                
                // Progress bar update
                const progress = ((index + 1) / logs.length) * 100;
                document.getElementById('scan-progress').style.width = `${progress}%`;

                setTimeout(() => typeLog(index + 1), 300);
            } else {
                setTimeout(() => switchScene('scene3'), 1000);
                setTimeout(runAIAnalysis, 1500);
            }
        }

        function runAIAnalysis() {
            const statusDiv = document.getElementById('ai-status');
            const statuses = [
                "Checking Retail Price...",
                "Bing Search: 'Quickle Wiper Price'",
                "Retail Price Found: ¥547",
                "Comparing with Auction Avg: ¥2,345",
                "Calculating Fees & Shipping...",
                "Profit Margin: HIGH"
            ];

            let i = 0;
            const interval = setInterval(() => {
                statusDiv.innerText = statuses[i];
                i++;
                if (i >= statuses.length) {
                    clearInterval(interval);
                    // AI分析が終わったら、激アツ演出へ遷移
                    setTimeout(() => {
                        playFlashSequence();
                    }, 1000);
                }
            }, 600);
        }

        function playFlashSequence() {
            switchScene('scene-flash');
            
            // 2.5秒間激アツ演出を表示してから結果へ
            setTimeout(() => {
                switchScene('scene4');
                setTimeout(() => document.getElementById('result-card').classList.add('show'), 100);
            }, 2500);
        }

        function startAnimation() {
            switchScene('scene2');
            typeLog();
        }
    </script>
</body>
</html>
